[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/booking"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/booking/"
  to = "/contact/"
  status = 301
