backend:
  name: git-gateway
  branch: master

local_backend: true

site_url: https://capcitypresents.com
display_url: https://capcitypresents.com
logo_url: /logo/opt-320/logo-txt-wht.png
show_preview_links: true

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: events
    label: Events
    label_singular: Event
    folder: src/content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} - {{date}}"
    sortable_fields: [date, title, venue, status]
    view_filters:
      - label: Upcoming/Announced
        field: status
        pattern: announced
      - label: Sold out
        field: status
        pattern: sold-out
      - label: Cancelled
        field: status
        pattern: cancelled
      - label: Past
        field: status
        pattern: past
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Doors Time, name: doorsTime, widget: string, required: false, hint: "Example: 7:00 PM" }
      - { label: Show Time, name: showTime, widget: string, required: false, hint: "Example: 8:00 PM" }
      - { label: Venue, name: venue, widget: string }
      - { label: City, name: city, widget: string, default: "Olympia, WA" }
      - { label: Age Restriction, name: ageRestriction, widget: string, required: false, hint: "Example: All Ages or 21+" }
      - { label: Price, name: price, widget: string, required: false, hint: "Example: $12 advance / $15 door" }
      - { label: Ticket URL, name: ticketUrl, widget: string, required: false }
      - { label: Facebook Event URL, name: facebookEventUrl, widget: string, required: false }
      - { label: Poster, name: poster, widget: image, required: false }
      - label: Poster Source
        name: posterSource
        widget: select
        required: false
        options:
          - { label: Manually selected, value: manual }
          - { label: Purplepass, value: purplepass }
          - { label: Facebook, value: facebook }
          - { label: Unknown, value: unknown }
      - { label: Lock Poster Choice, name: imageLocked, widget: boolean, default: false, required: false, hint: "Prevents the automated sync from changing the selected poster." }
      - label: Alternate Images
        name: alternateImages
        widget: list
        required: false
        collapsed: true
        fields:
          - { label: Image, name: path, widget: image }
          - label: Source
            name: source
            widget: select
            options: [manual, purplepass, facebook, unknown]
          - label: Image Type
            name: kind
            widget: select
            default: unknown
            options:
              - { label: Flyer, value: flyer }
              - { label: Platform graphic, value: platform-graphic }
              - { label: Band photo, value: photo }
              - { label: Unknown, value: unknown }
          - { label: Width, name: width, widget: number, required: false, value_type: int }
          - { label: Height, name: height, widget: number, required: false, value_type: int }
      - label: Locked Fields
        name: lockedFields
        widget: select
        multiple: true
        required: false
        hint: "Locked fields keep your manual value during future syncs."
        options:
          - title
          - date
          - doorsTime
          - showTime
          - venue
          - city
          - ageRestriction
          - price
          - ticketUrl
          - facebookEventUrl
          - description
      - { label: Sync ID, name: syncId, widget: hidden, required: false }
      - label: Status
        name: status
        widget: select
        default: announced
        options:
          - { label: Announced, value: announced }
          - { label: Sold out, value: sold-out }
          - { label: Cancelled, value: cancelled }
          - { label: Past, value: past }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Description, name: body, widget: markdown, required: false }
